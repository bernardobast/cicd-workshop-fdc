name: CI
run-name: ${{ github.actor }} is running the CI 🚀
on:
    # Runs this when a PR against main is created
    pull_request:
      branches: [ "main" ]

permissions:
  id-token: write   # REQUIRED for WIF
  contents: read

jobs:
    build-lint-test-deploy:
            runs-on: ubuntu-latest
            steps:
              # Fetches the GitHub repository files
              - name: Check out repository code 
                uses: actions/checkout@v4

              # Popular community-maintained action used to set up Flutter in GitHub workflows. 
              # Installs Flutter and allows you to run commands like flutter build, flutter test, and flutter analyze within your CI/CD pipeline.
              - name: Setup Flutter 
                uses: subosito/flutter-action@v2
                with:
                  channel: 'stable'

              # Build app for web
              - name: Build flutter app for web 🛜
                run: flutter build web
              
              - uses: google-github-actions/auth@v2
                with:
                  workload_identity_provider: "projects/518851495309/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
                  service_account: "cicd-workshop-sa@project-ef801521-090f-4fa8-9b5.iam.gserviceaccount.com"

              # Set the default GCP project for subsequent gcloud commands in your environment. 
              - name: Configure GCP Project
                run: gcloud config set project project-ef801521-090f-4fa8-9b

              # Configure Docker authentication for interacting with Artifact Registry, allowing you to push or pull Docker images securely.
              # Build the docker image and push top artifact registry.
              - name: Build and Push Docker Image 🐳
                run: |
                  gcloud auth configure-docker --quiet
                  gcloud auth configure-docker europe-west3-docker.pkg.dev --quiet
              
              - name: This will be your CD ⚙️
                run: |
                  echo "This will be your CD ⚙️"
                  docker build -t europe-west3-docker.pkg.dev/project-ef801521-090f-4fa8-9b5/cicd-workshop/cicd-test-1:1 .
                  docker push europe-west3-docker.pkg.dev/project-ef801521-090f-4fa8-9b5/cicd-workshop/cicd-test-1:1
                  gcloud run deploy {GOOGLE_CLOUD_RUN_SERVICE} \
                  --image europe-west3-docker.pkg.dev/project-ef801521-090f-4fa8-9b5/cicd-workshop/cicd-test-1:1 \
                  --region us-central1